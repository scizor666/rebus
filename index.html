<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rebus · Ребус</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <h1 class="logo">Ребус<span class="dot">·</span>Rebus</h1>
        <div class="lang-toggle" id="langToggle" role="group" aria-label="Language">
          <button type="button" class="lang-btn" data-lang="ru">RU</button>
          <button type="button" class="lang-btn" data-lang="en">EN</button>
        </div>
      </header>

      <main class="stage">
        <div class="puzzle" id="puzzle"></div>

        <form class="answer" id="answerForm" novalidate>
          <input
            id="answerInput"
            class="answer-input"
            type="text"
            autocomplete="off"
            autocapitalize="off"
            autocorrect="off"
            spellcheck="false"
          />
          <button class="btn btn--primary" id="submitBtn" type="submit">Check</button>
        </form>

        <div class="feedback" id="feedback" aria-live="polite"></div>
        <div class="controls" id="controls"></div>
      </main>

      <footer class="foot">No score · no timer · solve, reveal, or skip — forever</footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
